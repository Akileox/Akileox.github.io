title: Akileo
name: SeungMin Lee
email:
description: >-
  CS @ Korea University · AI / Vision / Robotics
url: "https://akileox.github.io"
baseurl: ""
github_username: Akileox
minimal_mistakes_skin: default
search: true
locale: "en-US"

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
permalink: /:categories/:title/
paginate: 10
paginate_path: /page:num/
timezone: Asia/Seoul

include:
  - _pages

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name: "SeungMin Lee"
  avatar: "/assets/images/bio-photo.jpg"
  bio: "AI · Vision · Robotics — CS @ Korea University"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Akileox"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:akileo@korea.ac.kr"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Akileox"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      comments: false
      share: true
      related: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
