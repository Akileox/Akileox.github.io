<header class="site-header">
  <div class="site-header__inner">

    <a class="site-logo" href="{{ '/' | relative_url }}">
      <svg class="site-logo__mark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88 88" aria-hidden="true">
        <circle cx="44" cy="44" r="44" fill="#111111"/>
        <path d="M44,22 Q38,34 29,68 M44,22 Q50,34 59,68"
              fill="none" stroke="white" stroke-width="5.5"
              stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="34" y1="47" x2="54" y2="47"
              stroke="white" stroke-width="5" stroke-linecap="round"/>
        <path d="M34,47 C17,44 13,22 40,20"
              fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M54,47 C71,44 75,22 48,20"
              fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
      </svg>
      Akileo
    </a>

    <nav class="site-nav" id="site-nav">
      {%- for link in site.data.navigation.main -%}
        <a class="site-nav__link" href="{{ link.url | relative_url }}">{{ link.title }}</a>
      {%- endfor -%}
    </nav>

    <button class="site-header__hamburger" id="nav-toggle" aria-label="메뉴 열기">
      <span></span><span></span><span></span>
    </button>

  </div>

  <!-- Mobile drawer -->
  <div class="site-nav-drawer" id="nav-drawer">
    {%- for link in site.data.navigation.main -%}
      <a href="{{ link.url | relative_url }}">{{ link.title }}</a>
    {%- endfor -%}
  </div>
</header>

<script>
  const toggle = document.getElementById('nav-toggle');
  const drawer = document.getElementById('nav-drawer');
  toggle.addEventListener('click', () => {
    drawer.classList.toggle('is-open');
    toggle.classList.toggle('is-open');
  });
</script>
